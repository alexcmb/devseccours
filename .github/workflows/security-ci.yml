name: Security CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Gitleaks
        run: |
          docker run --rm \
            -v "$PWD:/path" \
            zricethezav/gitleaks:latest \
            detect \
            --source=/path \
            --report-format=json \
            --report-path=/path/gitleaks-report.json

      - name: Upload Gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json

  codeql:
    name: CodeQL (Python)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Analyze
        uses: github/codeql-action/analyze@v4

  python-security:
    name: Python Security (Bandit + Semgrep)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit semgrep

      - name: Run Bandit (dangerous Python patterns)
        run: |
          bandit -r . -x .git,.venv,venv,__pycache__ -f json -o bandit-report.json

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

      - name: Run Semgrep (SQLi, injections, CSRF, secrets)
        run: |
          semgrep scan \
            --config p/security-audit \
            --config p/python \
            --config p/secrets \
            --sarif \
            --output semgrep.sarif \
            .

      - name: Upload Semgrep SARIF
        if: always() && hashFiles('semgrep.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif

      - name: Upload Semgrep report
        if: always() && hashFiles('semgrep.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: semgrep.sarif

  dependency-review:
    name: Dependency Review (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4

  snyk:
    name: Snyk (Code + Dependencies)
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Snyk
        if: env.SNYK_TOKEN != ''
        uses: snyk/actions/setup@master

      - name: Skip Snyk when token is missing
        if: env.SNYK_TOKEN == ''
        run: echo "SNYK_TOKEN is not set. Skipping Snyk scans."

      - name: Run Snyk Code test (SAST)
        if: env.SNYK_TOKEN != ''
        run: |
          snyk code test --severity-threshold=medium --sarif-file-output=snyk-code.sarif

      - name: Upload Snyk Code SARIF
        if: always() && env.SNYK_TOKEN != '' && hashFiles('snyk-code.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-code.sarif

      - name: Upload Snyk Code report
        if: always() && env.SNYK_TOKEN != '' && hashFiles('snyk-code.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: snyk-code-sarif
          path: snyk-code.sarif

      - name: Run Snyk Open Source test (dependencies)
        if: env.SNYK_TOKEN != ''
        run: |
          if [ -f requirements.txt ] || [ -f Pipfile ] || [ -f pyproject.toml ] || [ -f poetry.lock ]; then
            snyk test --all-projects --detection-depth=4 --severity-threshold=high
          else
            echo "No dependency manifest found, skipping Snyk Open Source test."
          fi

  vulnerability-report:
    name: Vulnerability Report (Markdown)
    if: always()
    needs:
      - secret-scan
      - codeql
      - python-security
      - dependency-review
      - snyk
    runs-on: ubuntu-latest
    steps:
      - name: Download scan artifacts
        uses: actions/download-artifact@v4
        with:
          path: scan-artifacts

      - name: Build vulnerability report
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path('scan-artifacts')
          report = [
              '# Vulnerabilities',
              '',
              'Aggregated report generated from the latest CI run.',
              '',
          ]

          def load_json(path):
              try:
                  return json.loads(path.read_text(encoding='utf-8'))
              except Exception:
                  return None

          def sarif_findings(path):
              data = load_json(path)
              if not data:
                  return []
              findings = []
              for run in data.get('runs', []):
                  for item in run.get('results', []):
                      locations = item.get('locations') or []
                      location = locations[0].get('physicalLocation', {}) if locations else {}
                      artifact = location.get('artifactLocation', {}).get('uri', 'unknown')
                      region = location.get('region', {})
                      findings.append({
                          'rule': item.get('ruleId', 'unknown'),
                          'message': item.get('message', {}).get('text', ''),
                          'file': artifact,
                          'line': region.get('startLine', ''),
                          'severity': item.get('level', ''),
                      })
              return findings

          def bandit_findings(path):
              data = load_json(path)
              if not data:
                  return []
              findings = []
              for item in data.get('results', []):
                  findings.append({
                      'rule': item.get('test_id', item.get('test_name', 'bandit')),
                      'message': item.get('issue_text', ''),
                      'file': item.get('filename', 'unknown'),
                      'line': item.get('line_number', ''),
                      'severity': item.get('issue_severity', ''),
                  })
              return findings

          def gitleaks_findings(path):
              data = load_json(path)
              if not data:
                  return []
              if isinstance(data, dict):
                  data = data.get('findings') or data.get('results') or []
              findings = []
              for item in data:
                  findings.append({
                      'rule': item.get('RuleID', item.get('ruleID', 'gitleaks')),
                      'message': item.get('Description', 'Secret detected'),
                      'file': item.get('File', 'unknown'),
                      'line': item.get('StartLine', ''),
                      'severity': item.get('Severity', 'high'),
                  })
              return findings

          sections = [
              ('Gitleaks', gitleaks_findings, ['gitleaks-report/gitleaks-report.json']),
              ('Bandit', bandit_findings, ['bandit-report/bandit-report.json']),
              ('Semgrep', sarif_findings, ['semgrep-sarif/semgrep.sarif']),
              ('Snyk Code', sarif_findings, ['snyk-code-sarif/snyk-code.sarif']),
          ]

          for title, finder, paths in sections:
              report.append(f'## {title}')
              existing = [root / rel for rel in paths if (root / rel).exists()]
              if not existing:
                  report.append('- No artifact was produced for this scan in this run.')
                  report.append('')
                  continue

              findings = []
              for path in existing:
                  findings.extend(finder(path))

              report.append(f'- Findings: {len(findings)}')
              if not findings:
                  report.append('- No findings reported.')
                  report.append('')
                  continue

              report.append('')
              report.append('| Severity | Rule | File | Line | Message |')
              report.append('| --- | --- | --- | --- | --- |')
              for finding in findings[:50]:
                  severity = str(finding.get('severity', '')).upper() or 'UNKNOWN'
                  rule = str(finding.get('rule', 'unknown'))
                  file = str(finding.get('file', 'unknown'))
                  line = str(finding.get('line', ''))
                  message = str(finding.get('message', '')).replace('|', '\\|')
                  report.append(f'| {severity} | {rule} | {file} | {line} | {message} |')
              report.append('')

          report.append('## Notes')
          report.append('- CodeQL findings are published to GitHub Security and are not duplicated in this Markdown artifact.')
          report.append('- This file is generated on each workflow run and uploaded as an artifact for centralized review.')

          Path('VULNERABILITIES.md').write_text('\n'.join(report) + '\n', encoding='utf-8')
          PY

      - name: Upload vulnerability report
        uses: actions/upload-artifact@v4
        with:
          name: vulnerabilities-report
          path: VULNERABILITIES.md
